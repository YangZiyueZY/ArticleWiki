<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4f46e5" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="46" fill="url(#bgGrad)" opacity="0.1"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#bgGrad)" stroke-width="2" opacity="0.3"/>

  <!-- Document/Paper base -->
  <rect x="22" y="18" width="44" height="56" rx="6" ry="6" fill="white" stroke="url(#bgGrad)" stroke-width="2.5" filter="url(#shadow)"/>

  <!-- Document lines -->
  <line x1="30" y1="32" x2="58" y2="32" stroke="#c7d2fe" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="42" x2="54" y2="42" stroke="#e0e7ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="52" x2="56" y2="52" stroke="#e0e7ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="62" x2="50" y2="62" stroke="#e0e7ff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Pen body -->
  <rect x="58" y="14" width="10" height="52" rx="5" ry="5" fill="url(#accentGrad)" transform="rotate(25 63 40)" filter="url(#shadow)"/>

  <!-- Pen tip -->
  <path d="M68.5 58 L73.5 72 L63.5 72 Z" fill="url(#bgGrad)" transform="rotate(25 68.5 65)"/>

  <!-- Pen clip -->
  <rect x="60" y="22" width="3" height="18" rx="1.5" ry="1.5" fill="white" opacity="0.6" transform="rotate(25 61.5 31)"/>

  <!-- Writing dot (ink) -->
  <circle cx="72" cy="74" r="3" fill="#4f46e5" opacity="0.8"/>
</svg>
